<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 저널리즘 데이터·통계 소스 디렉토리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222632;
    --border: #2d3348;
    --text: #e4e7ef;
    --text-muted: #8b90a5;
    --accent: #4f8ff7;
    --accent2: #7c5cfc;
    --green: #34d399;
    --orange: #f59e0b;
    --pink: #f472b6;
    --red: #f87171;
    --cyan: #22d3ee;
  }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .hero {
    padding: 3rem 1.5rem 2rem;
    text-align: center;
    background: linear-gradient(135deg, #1a1d27 0%, #16192a 50%, #1a1527 100%);
    border-bottom: 1px solid var(--border);
  }
  .hero h1 {
    font-size: 2.2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  .hero p {
    color: var(--text-muted);
    font-size: 0.95rem;
    max-width: 600px;
    margin: 0 auto;
  }
  .hero .meta {
    margin-top: 0.75rem;
    font-size: 0.8rem;
    color: var(--text-muted);
    opacity: 0.6;
  }

  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
  }
  .search-wrap {
    max-width: 700px;
    margin: 0 auto;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 0.65rem 1rem 0.65rem 2.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
  }

  .filter-bar {
    max-width: 900px;
    margin: 0.6rem auto 0;
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    justify-content: center;
  }
  .filter-btn {
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 0.75rem;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .section {
    margin-bottom: 2rem;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.8rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .section-icon {
    font-size: 1.3rem;
    width: 2rem;
    height: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .section-title {
    font-size: 1.15rem;
    font-weight: 700;
  }
  .section-count {
    font-size: 0.7rem;
    background: var(--surface2);
    color: var(--text-muted);
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    margin-left: auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 0.6rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .card:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-1px);
  }
  .card-name {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text);
  }
  .card-desc {
    font-size: 0.78rem;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .card-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
    transition: color 0.2s;
  }
  .card-url:hover { color: var(--cyan); text-decoration: underline; }
  .card-tags {
    display: flex;
    gap: 0.3rem;
    flex-wrap: wrap;
    margin-top: 0.15rem;
  }
  .tag {
    font-size: 0.62rem;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .tag-kr { border-color: #34d39944; color: var(--green); }
  .tag-intl { border-color: #4f8ff744; color: var(--accent); }
  .tag-new { border-color: #f59e0b44; color: var(--orange); }

  .hidden { display: none !important; }

  .stats-bar {
    text-align: center;
    padding: 0.5rem;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  footer {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--text-muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .hero h1 { font-size: 1.6rem; }
    .grid { grid-template-columns: 1fr; }
    .container { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>데이터 저널리즘 소스 디렉토리</h1>
  <p>데이터 저널리즘을 위한 국내외 데이터·통계 사이트 종합 가이드</p>
  <div class="meta">이종혁 (경희대 미디어학과) · 2025 Spring · 최종 업데이트 2025.03</div>
</div>

<div class="controls">

  </div>

    <button class="filter-btn" data-filter="과학·특허">과학·특허</button>
    <button class="filter-btn" data-filter="국제기구">국제기구</button>

    <button class="filter-btn" data-filter="시각화도구">시각화도구</button>
  </div>
</div>

<div class="container" id="content"></div>

<div class="stats-bar" id="statsBar"></div>

<footer>
  데이터저널리즘: 이론과 실무 · 이종혁 (경희대 미디어학과) · 취재보도 AI 도구 가이드: <a href="https://jonghhhh.github.io/test/journalism_ai.html" target="_blank" style="color:var(--accent)">jonghhhh.github.io/test/journalism_ai.html</a>
</footer>

  { cat: "시각화도구", name: "Chartmaker Directory", desc: "차트 유형별 소프트웨어 비교 매트릭스.", url: "https://chartmaker.visualisingdata.com/", tags: ["intl"] },
  { cat: "시각화도구", name: "From Data to Viz", desc: "데이터 유형에 맞는 최적 시각화 선택 가이드.", url: "https://www.data-to-viz.com/", tags: ["intl"] },
  { cat: "시각화도구", name: "RAWGraphs", desc: "오픈소스 데이터 시각화 프레임워크. 비정형 차트 지원.", url: "https://rawgraphs.io/", tags: ["intl"] },
  { cat: "시각화도구", name: "Gephi", desc: "오픈소스 네트워크 분석·시각화. 그래프 탐색.", url: "https://gephi.org/", tags: ["intl"] },
];

// ===== RENDER =====
const categories = [...new Set(DATA.map(d => d.cat))];
const catIcons = {
  "종합": "📊", "경제·금융": "💰", "사회·복지": "🏥", "교육": "🎓",
  "환경·에너지": "🌿", "교통·국토": "🚗", "법률·행정": "⚖️",
  "미디어·여론": "📰", "과학·특허": "🔬", "국제기구": "🌐",
  "해외오픈데이터": "🗂️", "저널리즘": "🔍", "시각화도구": "📈"
};
const catColors = {
  "종합": "#4f8ff7", "경제·금융": "#f59e0b", "사회·복지": "#f472b6", "교육": "#a78bfa",
  "환경·에너지": "#34d399", "교통·국토": "#22d3ee", "법률·행정": "#f87171",
  "미디어·여론": "#fb923c", "과학·특허": "#818cf8", "국제기구": "#4f8ff7",
  "해외오픈데이터": "#7c5cfc", "저널리즘": "#f472b6", "시각화도구": "#34d399"
};

function renderAll(filter = "all", search = "") {
  const container = document.getElementById("content");
  const q = search.toLowerCase();
  let totalShown = 0;

  let html = "";
  categories.forEach(cat => {
    if (filter !== "all" && filter !== cat) return;
    let items = DATA.filter(d => d.cat === cat);
    if (q) {
      items = items.filter(d =>
        d.name.toLowerCase().includes(q) ||
        d.desc.toLowerCase().includes(q) ||
        d.url.toLowerCase().includes(q) ||
        d.cat.toLowerCase().includes(q)
      );
    }
    if (!items.length) return;
    totalShown += items.length;

    html += `<div class="section">
      <div class="section-header">
        <div class="section-icon" style="background:${catColors[cat]}22;color:${catColors[cat]}">${catIcons[cat] || "📁"}</div>
        <div class="section-title">${cat}</div>
        <div class="section-count">${items.length}건</div>
      </div>
      <div class="grid">`;

    items.forEach(d => {
      const tagHtml = d.tags.map(t => {
        if (t === "kr") return '<span class="tag tag-kr">🇰🇷 국내</span>';
        if (t === "intl") return '<span class="tag tag-intl">🌐 해외</span>';
        if (t === "new") return '<span class="tag tag-new">✨ 신규</span>';
        return "";
      }).join("");

      html += `<div class="card">
        <div class="card-name">${d.name}</div>
        <div class="card-desc">${d.desc}</div>
        <a class="card-url" href="${d.url}" target="_blank" rel="noopener">${d.url.replace(/^https?:\/\//, '').replace(/\/$/, '')}</a>
        <div class="card-tags">${tagHtml}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html || '<div style="text-align:center;padding:3rem;color:var(--text-muted)">검색 결과가 없습니다.</div>';
  document.getElementById("statsBar").textContent = `총 ${DATA.length}개 사이트 중 ${totalShown}개 표시`;
}

// Event listeners
document.getElementById("searchInput").addEventListener("input", e => {
  const activeFilter = document.querySelector(".filter-btn.active")?.dataset.filter || "all";
  renderAll(activeFilter, e.target.value);
});

document.getElementById("filterBar").addEventListener("click", e => {
  if (!e.target.classList.contains("filter-btn")) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  e.target.classList.add("active");
  renderAll(e.target.dataset.filter, document.getElementById("searchInput").value);
});

renderAll();
</script>
</body>
</html>
